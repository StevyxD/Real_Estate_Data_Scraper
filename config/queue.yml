default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    # A SINGLE worker thread: scrapes must run one at a time (one headless
    # Chrome). More threads/processes would launch concurrent browsers, which
    # causes memory contention and InvalidSessionId crashes.
    - queues: "*"
      threads: 1
      processes: 1
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
